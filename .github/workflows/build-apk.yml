name: Build and Release APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint
        continue-on-error: true

      - name: Check TypeScript
        run: pnpm check
        continue-on-error: true

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        run: eas build --platform android --non-interactive

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: gallery-app-apk
          path: '*.apk'
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: '*.apk'
          draft: false
          prerelease: false
          body: |
            # Gallery App Release
            
            Download the APK file to install on your Android device.
            
            **Installation Instructions:**
            1. Download the APK file from below
            2. Transfer to your Android device
            3. Open file manager and tap the APK file
            4. Follow the installation prompts
            5. Grant necessary permissions
            
            **Features in this release:**
            - Beautiful gallery grid display
            - Full-screen image viewer
            - Favorites system
            - Search functionality
            - Dark mode support
            - Image zoom capabilities
            
            For more information, visit the [GitHub repository](https://github.com/${{ github.repository }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        continue-on-error: true
